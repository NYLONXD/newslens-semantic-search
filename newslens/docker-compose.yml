services:
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: ""
    volumes:
      - endee-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newslens-backend
    ports:
      - "8000:8000"
    environment:
      ENDEE_HOST: http://endee:8080
      ENDEE_AUTH_TOKEN: ""
    volumes:
      - ./data:/app/data
    depends_on:
      endee:
        condition: service_healthy
    restart: unless-stopped

volumes:
  endee-data:
