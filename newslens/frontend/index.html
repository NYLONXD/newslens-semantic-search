<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NewsLens — Semantic News Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    /* ── Reset & base ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #0f0e0c;
      --ink-muted:  #5a5853;
      --ink-faint:  #b0aca4;
      --paper:      #f8f5f0;
      --paper-warm: #ede9e2;
      --accent:     #c1440e;       /* bold terracotta red */
      --accent-dim: #e8c4b8;
      --rule:       rgba(15,14,12,.12);
      --rule-strong: rgba(15,14,12,.25);
      --serif:      'Playfair Display', Georgia, serif;
      --sans:       'DM Sans', system-ui, sans-serif;
      --mono:       'DM Mono', monospace;
      --max-w:      820px;
      --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Masthead ──────────────────────────────── */
    header {
      border-bottom: 1.5px solid var(--rule-strong);
      padding: 0 clamp(1rem, 5vw, 3rem);
    }

    .masthead-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 0 0;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 500;
    }

    .masthead-top .badge {
      background: var(--accent);
      color: #fff;
      padding: .2em .6em;
      border-radius: 2px;
      font-size: .65rem;
      letter-spacing: .1em;
    }

    .logo {
      text-align: center;
      padding: 1.5rem 0 1.25rem;
      border-top: 1px solid var(--rule);
      margin-top: 1rem;
    }

    .logo h1 {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1;
      color: var(--ink);
    }

    .logo h1 span { color: var(--accent); font-style: italic; }

    .logo .tagline {
      margin-top: .5rem;
      font-size: .78rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 400;
    }

    /* ── Search bar section ────────────────────── */
    .search-section {
      max-width: var(--max-w);
      margin: 2.5rem auto 0;
      padding: 0 clamp(1rem, 5vw, 2rem);
    }

    .search-form {
      display: flex;
      gap: .5rem;
      align-items: stretch;
    }

    .search-input-wrap {
      flex: 1;
      position: relative;
    }

    .search-input-wrap svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: var(--ink-faint);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke .2s;
    }

    #query {
      width: 100%;
      padding: .9rem 1rem .9rem 2.8rem;
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 300;
      background: #fff;
      border: 1.5px solid var(--rule-strong);
      border-radius: 3px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    #query:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    #query:focus + svg,
    .search-input-wrap:focus-within svg { stroke: var(--accent); }

    #search-btn {
      padding: .9rem 1.6rem;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--sans);
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .06em;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background .18s, transform .1s;
      white-space: nowrap;
    }

    #search-btn:hover { background: var(--accent); }
    #search-btn:active { transform: scale(.97); }
    #search-btn:disabled { opacity: .5; cursor: default; }

    /* Example pills */
    .examples {
      margin-top: .85rem;
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      align-items: center;
    }

    .examples span {
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      font-weight: 500;
    }

    .pill {
      font-size: .78rem;
      padding: .28em .75em;
      border: 1px solid var(--rule-strong);
      border-radius: 100px;
      color: var(--ink-muted);
      cursor: pointer;
      background: transparent;
      font-family: var(--sans);
      font-weight: 400;
      transition: border-color .15s, color .15s, background .15s;
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(193,68,14,.05);
    }

    /* ── Results area ──────────────────────────── */
    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 clamp(1rem, 5vw, 2rem) 4rem;
    }

    /* Status bar */
    #status-bar {
      margin-top: 2rem;
      padding: .6rem 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 2.4rem;
    }

    #status-bar.hidden { display: none; }

    .dot-loader {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dot-loader span {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce .9s ease-in-out infinite;
      display: inline-block;
    }

    .dot-loader span:nth-child(2) { animation-delay: .15s; }
    .dot-loader span:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    /* Result cards */
    #results-list {
      margin-top: .25rem;
      display: flex;
      flex-direction: column;
    }

    .result-card {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .5rem 1.5rem;
      align-items: start;
      animation: fadeUp .4s var(--ease-out) both;
    }

    .result-card:nth-child(1) { animation-delay: 0s; }
    .result-card:nth-child(2) { animation-delay: .06s; }
    .result-card:nth-child(3) { animation-delay: .12s; }
    .result-card:nth-child(4) { animation-delay: .18s; }
    .result-card:nth-child(5) { animation-delay: .24s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: .4rem;
    }

    .cat-tag {
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--accent);
    }

    .meta-dot { color: var(--ink-faint); font-size: .75rem; }

    .source-name {
      font-size: .72rem;
      color: var(--ink-muted);
      font-weight: 400;
      letter-spacing: .04em;
    }

    .card-title {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--ink);
      margin-bottom: .45rem;
    }

    .card-title a {
      color: inherit;
      text-decoration: none;
      transition: color .15s;
    }

    .card-title a:hover { color: var(--accent); }

    .card-snippet {
      font-size: .88rem;
      line-height: 1.65;
      color: var(--ink-muted);
      font-weight: 300;
    }

    /* Score badge (right column) */
    .score-col {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: .2rem;
      padding-top: 1.5rem;
    }

    .score-label {
      font-size: .6rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .score-value {
      font-family: var(--mono);
      font-size: .9rem;
      font-weight: 400;
      color: var(--ink);
    }

    .score-bar {
      width: 48px;
      height: 3px;
      background: var(--paper-warm);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .4s var(--ease-out);
    }

    /* ── Empty / error states ──────────────────── */
    .state-msg {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--ink-muted);
      animation: fadeUp .35s var(--ease-out);
    }

    .state-msg .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
    }

    .state-msg h3 {
      font-family: var(--serif);
      font-size: 1.4rem;
      margin-bottom: .4rem;
      color: var(--ink);
    }

    .state-msg p {
      font-size: .88rem;
      font-weight: 300;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto;
    }

    /* ── Footer ────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      border-top: 1px solid var(--rule);
    }

    footer a { color: var(--ink-muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── Responsive ────────────────────────────── */
    @media (max-width: 560px) {
      .result-card { grid-template-columns: 1fr; }
      .score-col { flex-direction: row; align-items: center; padding-top: 0; }
      .score-bar { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Masthead ─────────────────────────── -->
<header>
  <div class="masthead-top">
    <span>Semantic News Search</span>
    <span class="badge">Powered by Endee</span>
  </div>
  <div class="logo">
    <h1>News<span>Lens</span></h1>
    <p class="tagline">Search by meaning, not keywords</p>
  </div>
</header>

<!-- ── Search bar ───────────────────────── -->
<section class="search-section">
  <form class="search-form" id="search-form" onsubmit="doSearch(event)">
    <div class="search-input-wrap">
      <input
        type="text"
        id="query"
        placeholder="e.g. breakthroughs in cancer research…"
        autocomplete="off"
        spellcheck="false"
      />
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <button type="submit" id="search-btn">Search</button>
  </form>

  <div class="examples">
    <span>Try →</span>
    <button class="pill" onclick="setQuery('climate change and rising sea levels')">climate change</button>
    <button class="pill" onclick="setQuery('electric vehicles and battery technology')">EVs &amp; batteries</button>
    <button class="pill" onclick="setQuery('artificial intelligence in medicine')">AI in medicine</button>
    <button class="pill" onclick="setQuery('inflation and interest rates')">inflation</button>
    <button class="pill" onclick="setQuery('space exploration missions')">space missions</button>
  </div>
</section>

<!-- ── Results ───────────────────────────── -->
<main>
  <div id="status-bar" class="hidden">
    <span id="status-text"></span>
    <span id="status-right"></span>
  </div>
  <div id="results-list"></div>
</main>

<!-- ── Footer ───────────────────────────── -->
<footer>
  <p>
    Built with <a href="https://github.com/endee-io/endee" target="_blank">Endee</a> vector database
    &nbsp;·&nbsp; all-MiniLM-L6-v2 embeddings &nbsp;·&nbsp; FastAPI backend
  </p>
</footer>

<script>
  const API_BASE = 'http://localhost:8000';

  function setQuery(text) {
    document.getElementById('query').value = text;
    doSearch();
  }

  async function doSearch(event) {
    if (event) event.preventDefault();

    const q = document.getElementById('query').value.trim();
    if (!q) return;

    const btn       = document.getElementById('search-btn');
    const statusBar = document.getElementById('status-bar');
    const statusTxt = document.getElementById('status-text');
    const statusRt  = document.getElementById('status-right');
    const list      = document.getElementById('results-list');

    // Loading state
    btn.disabled = true;
    btn.textContent = 'Searching…';
    statusBar.className = '';
    statusTxt.innerHTML = `
      <div class="dot-loader">
        <span></span><span></span><span></span>
        &nbsp; Embedding query &amp; searching Endee…
      </div>`;
    statusRt.textContent = '';
    list.innerHTML = '';

    const t0 = performance.now();

    try {
      const res  = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}&top_k=8`);
      const data = await res.json();
      const ms   = Math.round(performance.now() - t0);

      if (!res.ok) {
        throw new Error(data.detail || `HTTP ${res.status}`);
      }

      const n = data.results.length;
      statusTxt.textContent = `${n} result${n !== 1 ? 's' : ''} for "${data.query}"`;
      statusRt.textContent  = `${ms} ms`;

      if (n === 0) {
        list.innerHTML = `
          <div class="state-msg">
            <span class="icon">🔍</span>
            <h3>No results found</h3>
            <p>Try rephrasing your query or use one of the example searches above.</p>
          </div>`;
        return;
      }

      list.innerHTML = data.results.map((r, i) => `
        <article class="result-card">
          <div>
            <div class="card-meta">
              <span class="cat-tag">${escHtml(r.category)}</span>
              <span class="meta-dot">·</span>
              <span class="source-name">${escHtml(r.source)}</span>
            </div>
            <h2 class="card-title">
              <a href="${escHtml(r.url)}" target="_blank" rel="noopener">${escHtml(r.title)}</a>
            </h2>
            <p class="card-snippet">${escHtml(r.snippet)}</p>
          </div>
          <div class="score-col">
            <span class="score-label">Match</span>
            <span class="score-value">${(r.similarity_score * 100).toFixed(1)}%</span>
            <div class="score-bar">
              <div class="score-fill" style="width:${(r.similarity_score * 100).toFixed(1)}%"></div>
            </div>
          </div>
        </article>
      `).join('');

    } catch (err) {
      statusTxt.textContent = 'Error';
      list.innerHTML = `
        <div class="state-msg">
          <span class="icon">⚠️</span>
          <h3>Could not connect</h3>
          <p>${escHtml(err.message)}<br><br>
          Make sure the FastAPI backend is running on <code>http://localhost:8000</code>
          and the indexer has been run.</p>
        </div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
